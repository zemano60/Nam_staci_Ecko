<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vydaná čísla | Journal</title>
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <style>
    details{
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      padding:12px 16px;
      margin-bottom:10px;
      background:#fff;
      box-shadow:var(--shadow-sm);
      transition:border-color var(--trans), box-shadow var(--trans);
    }
    details[open]{ border-color:rgba(124,58,237,.25); box-shadow:0 2px 10px rgba(124,58,237,.07); }
    summary{cursor:pointer;font-weight:700;color:var(--text);}
    .art{
      padding:10px 0;
      border-bottom:1px solid var(--border);
    }
    .art:last-child{border-bottom:0}
    .muted{color:var(--muted)}
  </style>
</head>
<body class="public">
  <header class="header">
    <div class="wrap">
      <h1>Vydaná čísla</h1>
      <nav class="nav">
  <a href="./index.html" class="pill">O časopisu</a>
  <a href="./cisla.html" class="pill">Vydaná čísla</a>
  <a href="./help.html" class="pill">Nápověda</a>
  <a href="./seed.html" class="pill">DEMO data</a>
  <a href="../index.html" class="pill">Přihlášení</a>
</nav>
    </div>
  </header>

  <main class="page">
    <section class="panel">
      <div class="panel-head"><h2>Přehled čísel</h2></div>
      <div id="issues-empty" class="empty" style="display:none">Zatím nejsou publikovaná žádná čísla.</div>
      <div id="issuesList"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/public.js"></script>
</body>
</html>
